<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aegis · Internal Audit & Risk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #fafbfc;
    --surface: #ffffff;
    --surface-2: #f5f7fa;
    --border: #e5e8ec;
    --border-strong: #d4d8de;
    --text: #1a1f2e;
    --text-2: #4a5568;
    --text-3: #717a89;
    --text-4: #9ba3af;
    --accent: #4338ca;
    --accent-2: #6366f1;
    --accent-soft: #eef2ff;
    --accent-strong: #3730a3;

    --rag-critical: #b91c1c;
    --rag-critical-soft: #fef2f2;
    --rag-high: #dc2626;
    --rag-high-soft: #fef2f2;
    --rag-medium: #ea580c;
    --rag-medium-soft: #fff7ed;
    --rag-low: #15803d;
    --rag-low-soft: #f0fdf4;

    --hover-critical: #fee2e2;
    --hover-high: #fee2e2;
    --hover-medium: #ffedd5;
    --hover-low: #dcfce7;

    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-md: 0 1px 3px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-lg: 0 4px 16px rgba(15, 23, 42, 0.08), 0 1px 3px rgba(15, 23, 42, 0.04);
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ============================ LAYOUT ============================ */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 8px 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .brand-mark {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-radius: 6px;
    position: relative;
  }
  .brand-mark::after {
    content: ''; position: absolute; inset: 6px;
    background: var(--surface);
    clip-path: polygon(50% 0, 100% 25%, 100% 70%, 50% 100%, 0 70%, 0 25%);
  }
  .brand-name { font-weight: 600; font-size: 16px; letter-spacing: -0.01em; }
  .brand-tag { font-size: 11px; color: var(--text-3); margin-top: 1px; }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    color: var(--text-2);
    cursor: pointer;
    font-weight: 500;
    transition: all 120ms;
    user-select: none;
  }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); }
  .nav-item .ico { width: 16px; height: 16px; opacity: 0.85; }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
  }
  .role-pill {
    font-size: 11px; color: var(--text-3);
    padding: 8px 12px; border-radius: var(--radius-sm);
    background: var(--surface-2);
  }
  .role-pill select {
    width: 100%; border: none; background: transparent;
    font-family: inherit; font-size: 12px; color: var(--text);
    margin-top: 2px; cursor: pointer; padding: 0;
  }

  .main { flex: 1; min-width: 0; overflow-x: auto; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .topbar-left { display: flex; flex-direction: column; gap: 2px; }
  .topbar-date { font-size: 12px; color: var(--text-3); letter-spacing: 0.02em; text-transform: uppercase; }
  .topbar-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-2); }
  .pulse-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #16a34a;
    box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.5); }
    70% { box-shadow: 0 0 0 8px rgba(22, 163, 74, 0); }
    100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-3); }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white; font-weight: 600; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }

  .page { padding: 32px 40px 80px; max-width: 1180px; }
  .page-wide { padding: 32px 40px 80px; }

  /* ============================ HOME ============================ */
  .home-header {
    margin-bottom: 24px;
  }
  .home-title {
    font-size: 26px; font-weight: 600; letter-spacing: -0.02em;
    margin: 0 0 4px;
  }
  .home-subtitle { color: var(--text-3); font-size: 14px; }

  .briefing-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    overflow: hidden;
  }
  .tile-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .tile-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .tile-meta { font-size: 12px; color: var(--text-3); }

  .notif {
    display: grid;
    grid-template-columns: 4px 1fr auto;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 120ms;
    gap: 16px;
    align-items: center;
  }
  .notif:last-child { border-bottom: none; }
  .notif.critical:hover { background: var(--hover-critical); }
  .notif.high:hover { background: var(--hover-high); }
  .notif.medium:hover { background: var(--hover-medium); }
  .notif.low:hover { background: var(--hover-low); }
  .notif-rail { width: 4px; border-radius: 2px; align-self: stretch; }
  .notif-rail.critical { background: var(--rag-critical); }
  .notif-rail.high { background: var(--rag-high); }
  .notif-rail.medium { background: var(--rag-medium); }
  .notif-rail.low { background: var(--rag-low); }

  .notif-body { min-width: 0; }
  .notif-meta {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    font-size: 12px; margin-bottom: 8px;
  }
  .sev-tag {
    font-weight: 600; font-size: 11px; letter-spacing: 0.04em;
    padding: 3px 8px; border-radius: 4px; text-transform: uppercase;
  }
  .sev-tag.critical { background: var(--rag-critical-soft); color: var(--rag-critical); }
  .sev-tag.high { background: var(--rag-high-soft); color: var(--rag-high); }
  .sev-tag.medium { background: var(--rag-medium-soft); color: var(--rag-medium); }
  .sev-tag.low { background: var(--rag-low-soft); color: var(--rag-low); }

  .notif-source { color: var(--text-2); font-weight: 500; }
  .verified {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--text-3); font-size: 11px;
  }
  .verified::before {
    content: '✓'; color: #16a34a; font-weight: 700;
  }
  .notif-time { color: var(--text-3); margin-left: auto; }

  .notif-title {
    font-size: 15px; font-weight: 600; margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .notif-what {
    color: var(--text-2);
    margin: 0 0 4px;
    font-size: 13px;
  }
  .notif-why {
    color: var(--text-2);
    margin: 0 0 10px;
    font-size: 13px;
  }
  .notif-why strong { color: var(--text); font-weight: 600; }

  .agent-done-inline {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .agent-done-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-right: 4px;
  }
  .done-chip {
    background: var(--surface-2);
    color: var(--text-2);
    padding: 3px 9px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border);
  }
  .done-chip::before { content: '✓ '; color: #16a34a; font-weight: 700; }

  .notif-action {
    align-self: center;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 120ms;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--text-3); background: var(--surface-2); }
  .btn-primary {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .btn-primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
  .btn-lg { padding: 11px 20px; font-size: 14px; }
  .btn-link {
    background: none; border: none; color: var(--accent);
    cursor: pointer; padding: 0; font-family: inherit; font-size: 13px;
    font-weight: 500; text-decoration: none;
  }
  .btn-link:hover { text-decoration: underline; }

  .home-counts {
    margin-top: 20px;
    padding: 14px 24px;
    color: var(--text-3);
    font-size: 13px;
    text-align: center;
  }
  .home-counts a {
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: rgba(67, 56, 202, 0.3);
  }

  /* ============================ SCREEN 2 ============================ */
  .breadcrumb {
    display: flex; align-items: center; gap: 8px;
    color: var(--text-3); font-size: 13px;
    margin-bottom: 18px;
  }
  .breadcrumb a { color: var(--text-3); cursor: pointer; }
  .breadcrumb a:hover { color: var(--text); }

  .event-header {
    display: flex; align-items: start; gap: 16px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .event-header-left { flex: 1; }
  .event-meta {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    font-size: 13px; color: var(--text-3); margin-bottom: 10px;
  }
  .event-title {
    font-size: 28px; font-weight: 600; letter-spacing: -0.02em;
    margin: 0; line-height: 1.25;
  }

  .reading {
    max-width: 760px;
  }
  .reading section {
    margin-bottom: 28px;
  }
  .reading h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-3);
    margin: 0 0 12px;
  }
  .reading p {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    margin: 0 0 8px;
  }
  .reading p.muted { color: var(--text-2); }

  .stats-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 18px 0 12px;
    overflow: hidden;
  }
  .stat {
    background: var(--surface);
    padding: 18px 22px;
  }
  .stat-label {
    font-size: 11px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 26px; font-weight: 600; letter-spacing: -0.02em;
    color: var(--text);
  }
  .stat-sub {
    font-size: 12px; color: var(--text-3); margin-top: 4px;
  }
  .stat-flag {
    display: inline-block; font-size: 10px;
    padding: 2px 6px; border-radius: 3px; margin-top: 8px;
    background: var(--rag-medium-soft); color: var(--rag-medium);
    font-weight: 500; letter-spacing: 0.02em;
  }

  .control-list { list-style: none; padding: 0; margin: 0; }
  .control-list li {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .control-list li:last-child { border-bottom: none; }
  .control-list .control-name { font-weight: 500; color: var(--text); }
  .control-list .control-desc { color: var(--text-2); }

  .entity-list { list-style: none; padding: 0; margin: 0; }
  .entity-list li {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .entity-list li:last-child { border-bottom: none; }
  .entity-code {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    background: var(--surface-2); padding: 4px 8px;
    border-radius: 4px; color: var(--text-2);
    min-width: 80px; text-align: center;
  }
  .entity-name { font-weight: 500; }
  .entity-rationale { color: var(--text-3); font-size: 13px; margin-left: auto; }

  .action-bar {
    display: flex; align-items: center; gap: 16px;
    padding: 24px 0;
    border-top: 1px solid var(--border);
    margin-top: 32px;
  }

  .sources-footer {
    margin-top: 24px;
    padding: 16px 0;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-3);
  }
  .sources-footer-label {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .sources-footer ul {
    list-style: none; padding: 0; margin: 0;
    display: flex; flex-wrap: wrap; gap: 6px 18px;
  }
  .sources-footer li::before {
    content: '✓'; color: #16a34a; margin-right: 6px; font-weight: 700;
  }

  /* ============================ MOBILE / LOCK SCREEN ============================ */
  .mobile-stage {
    position: fixed; inset: 0;
    background: radial-gradient(1200px 600px at 30% 10%, #1f2937 0%, #0b1220 60%, #050810 100%);
    display: flex; align-items: center; justify-content: center;
    gap: 56px;
    padding: 40px;
    overflow: auto;
    z-index: 50;
  }
  .phone {
    position: relative;
    width: 360px; height: 740px;
    background: #0a0d12;
    border-radius: 48px;
    padding: 14px;
    box-shadow:
      0 0 0 2px #1a1f2e,
      0 30px 90px rgba(0,0,0,0.6),
      0 8px 24px rgba(0,0,0,0.4);
    flex-shrink: 0;
  }
  .phone-notch {
    position: absolute;
    top: 22px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 30px;
    background: #050810;
    border-radius: 16px;
    z-index: 3;
  }
  .phone-screen {
    width: 100%; height: 100%;
    border-radius: 36px;
    background:
      linear-gradient(180deg, rgba(15,23,42,0.65) 0%, rgba(15,23,42,0.85) 100%),
      radial-gradient(circle at 30% 20%, #4338ca 0%, #1e1b4b 50%, #0b1220 100%);
    color: #fff;
    overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
  }
  .phone-statusbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 28px 8px;
    font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,0.95);
  }
  .phone-status-icons { display: flex; gap: 6px; align-items: center; }
  .phone-bars, .phone-wifi, .phone-battery {
    display: inline-block; width: 16px; height: 12px;
    background: rgba(255,255,255,0.85);
    -webkit-mask-position: center; mask-position: center;
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-mask-size: contain; mask-size: contain;
  }
  .phone-bars { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="5" y="5" width="3" height="7" rx="0.5"/><rect x="10" y="2" width="3" height="10" rx="0.5"/><rect x="15" y="0" width="3" height="12" rx="0.5"/></svg>'); mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="5" y="5" width="3" height="7" rx="0.5"/><rect x="10" y="2" width="3" height="10" rx="0.5"/><rect x="15" y="0" width="3" height="12" rx="0.5"/></svg>'); }
  .phone-wifi { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 12"><path d="M8 11 L10 9 A3 3 0 0 0 6 9 Z M8 6 A6 6 0 0 1 13 9 L11 11 A3 3 0 0 0 5 11 L3 9 A6 6 0 0 1 8 6 Z M8 1 A11 11 0 0 1 16 5 L14 7 A8 8 0 0 0 2 7 L0 5 A11 11 0 0 1 8 1 Z" fill="black"/></svg>'); mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 12"><path d="M8 11 L10 9 A3 3 0 0 0 6 9 Z M8 6 A6 6 0 0 1 13 9 L11 11 A3 3 0 0 0 5 11 L3 9 A6 6 0 0 1 8 6 Z M8 1 A11 11 0 0 1 16 5 L14 7 A8 8 0 0 0 2 7 L0 5 A11 11 0 0 1 8 1 Z" fill="black"/></svg>'); }
  .phone-battery {
    width: 24px; height: 12px;
    background: transparent;
    border: 1.2px solid rgba(255,255,255,0.85);
    border-radius: 3px;
    position: relative;
    -webkit-mask-image: none; mask-image: none;
  }
  .phone-battery::before {
    content: ''; position: absolute; inset: 1.5px;
    width: 80%; background: rgba(255,255,255,0.9); border-radius: 1.5px;
  }
  .phone-battery::after {
    content: ''; position: absolute; right: -3px; top: 3px;
    width: 2px; height: 4px; background: rgba(255,255,255,0.85); border-radius: 0 1px 1px 0;
  }

  .phone-lockinfo {
    text-align: center;
    padding: 20px 16px 18px;
    color: rgba(255,255,255,0.95);
  }
  .phone-date { font-size: 14px; font-weight: 500; opacity: 0.85; }
  .phone-bigtime { font-size: 64px; font-weight: 200; letter-spacing: -0.02em; line-height: 1; margin-top: 4px; font-feature-settings: 'tnum'; }

  .phone-notif-stack {
    flex: 1; min-height: 0;
    overflow-y: auto;
    padding: 10px 12px 24px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .phone-notif-stack::-webkit-scrollbar { width: 0; }
  .phone-notif-group-label {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    padding: 0 6px 4px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .phone-notif {
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 18px;
    padding: 12px 14px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    color: #fff;
    animation: notifSlideIn 500ms ease-out backwards;
  }
  .phone-notif:nth-child(2) { animation-delay: 80ms; }
  .phone-notif:nth-child(3) { animation-delay: 160ms; }
  .phone-notif:nth-child(4) { animation-delay: 240ms; }
  @keyframes notifSlideIn {
    from { opacity: 0; transform: translateY(10px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .phone-notif.lead {
    background: rgba(255,255,255,0.22);
    border: 1px solid rgba(255,255,255,0.18);
  }
  .phone-notif-head {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 6px;
  }
  .phone-app-mark {
    width: 14px; height: 14px;
    border-radius: 4px;
    background: linear-gradient(135deg, #6366f1, #4338ca);
    color: #fff; font-size: 9px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .phone-app-name { font-weight: 600; letter-spacing: 0.04em; }
  .phone-sev {
    font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
    padding: 2px 6px; border-radius: 4px;
    margin-left: 4px;
  }
  .phone-sev.sev-critical { background: rgba(220,38,38,0.9); color: #fff; }
  .phone-sev.sev-high { background: rgba(220,38,38,0.7); color: #fff; }
  .phone-sev.sev-medium { background: rgba(234,88,12,0.85); color: #fff; }
  .phone-sev.sev-low { background: rgba(21,128,61,0.85); color: #fff; }
  .phone-notif-time { margin-left: auto; opacity: 0.7; font-size: 10px; }
  .phone-notif-title {
    font-size: 14px; font-weight: 600;
    line-height: 1.3;
    color: #fff;
    margin-bottom: 4px;
  }
  .phone-notif-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.78);
    line-height: 1.4;
  }
  .phone-notif-impact {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.12);
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    line-height: 1.45;
  }
  .phone-notif-impact strong { color: #fff; }
  .phone-actions {
    display: flex; flex-direction: column; gap: 8px;
    margin-top: 12px;
  }
  .phone-btn {
    width: 100%;
    border: none; border-radius: 12px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: transform 120ms, background 120ms;
  }
  .phone-btn.primary {
    background: #fff;
    color: #1a1f2e;
  }
  .phone-btn.primary:hover { transform: translateY(-1px); background: rgba(255,255,255,0.92); }
  .phone-btn.secondary {
    background: rgba(255,255,255,0.18);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.25);
  }
  .phone-btn.secondary:hover { transform: translateY(-1px); background: rgba(255,255,255,0.26); }

  .phone-bottom-hint {
    padding: 10px 0 12px;
    display: flex; justify-content: center;
  }
  .phone-home-indicator {
    width: 130px; height: 5px;
    background: rgba(255,255,255,0.6);
    border-radius: 3px;
  }

  .mobile-side-note {
    color: rgba(255,255,255,0.85);
    max-width: 320px;
    font-size: 13px;
    line-height: 1.6;
  }
  .mobile-side-mark {
    display: flex; align-items: center; gap: 10px;
    color: rgba(255,255,255,0.85);
    font-weight: 600;
    margin-bottom: 16px;
  }
  .mobile-side-mark .brand-mark { width: 22px; height: 22px; }
  .mobile-side-mark .brand-mark::after { background: #0b1220; }
  .mobile-side-title {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .mobile-side-note p {
    color: rgba(255,255,255,0.7);
    margin: 0 0 16px;
  }
  .mobile-side-note strong { color: rgba(255,255,255,0.95); font-weight: 600; }
  .mobile-side-meta {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  @media (max-width: 900px) {
    .mobile-stage { flex-direction: column; gap: 28px; padding: 24px 16px; }
    .mobile-side-note { max-width: 360px; text-align: center; }
    .mobile-side-mark { justify-content: center; }
  }

  /* ============================ INTERSTITIAL ============================ */
  .interstitial {
    position: fixed; inset: 0;
    background: #0b1220;
    z-index: 100;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    color: white;
    overflow: hidden;
  }
  .interstitial-mark {
    position: absolute; top: 28px; left: 32px;
    display: flex; align-items: center; gap: 10px;
    opacity: 0.3;
    color: white;
    font-weight: 600;
  }
  .interstitial-mark .brand-mark { width: 22px; height: 22px; }
  .interstitial-mark .brand-mark::after { background: #0b1220; }

  .interstitial-skip {
    position: absolute; bottom: 24px; right: 32px;
    color: rgba(255,255,255,0.4);
    background: none; border: none;
    font-family: inherit; font-size: 12px;
    cursor: pointer;
  }
  .interstitial-skip:hover { color: rgba(255,255,255,0.8); }

  .work-log {
    width: 720px; max-width: 90vw;
    height: 360px;
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; line-height: 1.9;
    display: flex; flex-direction: column; justify-content: flex-end;
    mask-image: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.4) 15%, rgba(0,0,0,1) 35%, rgba(0,0,0,1) 100%);
  }
  .log-line {
    color: rgba(255,255,255,0.9);
    opacity: 0;
    animation: appear 400ms forwards;
  }
  .log-line.recent { color: rgba(255,255,255,0.85); }
  .log-line.older { color: rgba(255,255,255,0.55); }
  .log-line.oldest { color: rgba(255,255,255,0.35); }
  .log-line.active {
    color: rgba(255,255,255,1);
    animation: appear 400ms forwards, linePulse 1.6s infinite;
  }
  .log-ts { color: rgba(99, 102, 241, 0.85); margin-right: 12px; }
  @keyframes appear {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes linePulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  .row-counter {
    margin-top: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    height: 18px;
  }
  .row-counter strong { color: rgba(99, 102, 241, 1); font-weight: 500; }

  .progress-bar {
    position: absolute; bottom: 0; left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent-2), #22d3ee);
    width: 0;
    transition: width 200ms linear;
  }

  .ready-modal {
    position: absolute;
    background: var(--surface);
    color: var(--text);
    padding: 32px 36px;
    border-radius: var(--radius-lg);
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: zoomIn 280ms ease-out;
    width: 380px;
  }
  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }
  .ready-modal-check {
    width: 44px; height: 44px; border-radius: 50%;
    background: #16a34a; color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin: 0 auto 14px;
  }
  .ready-modal h3 { margin: 0 0 6px; font-size: 18px; }
  .ready-modal p { color: var(--text-2); margin: 0 0 20px; font-size: 14px; }

  /* ============================ SCREEN 3 ============================ */
  .tile-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-top: 24px;
  }
  .calib-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .calib-tile-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .calib-tile-title {
    font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
  }
  .calib-tile-suggested {
    font-size: 11px; color: var(--text-3);
    background: var(--accent-soft);
    color: var(--accent);
    padding: 2px 8px; border-radius: 10px;
    font-weight: 500;
  }
  .calib-tile-body { padding: 8px 0; }

  .calib-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    padding: 9px 18px;
    align-items: start;
  }
  .calib-row:hover { background: var(--surface-2); }
  .calib-row .check {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border-strong);
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    background: white;
    display: flex; align-items: center; justify-content: center;
    transition: all 120ms;
  }
  .calib-row .check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .calib-row .check.checked::after {
    content: '✓'; color: white; font-size: 11px; font-weight: 700;
  }
  .calib-row-main { font-size: 13px; }
  .calib-row-sub { font-size: 12px; color: var(--text-3); margin-top: 1px; }
  .calib-row-aside { color: var(--text-3); font-size: 11px; margin-top: 2px; }

  .calib-add {
    padding: 10px 18px;
    color: var(--accent);
    font-size: 13px;
    cursor: pointer;
    border-top: 1px solid var(--border);
    background: white;
  }
  .calib-add:hover { background: var(--surface-2); }

  .why-link {
    color: var(--text-3); font-size: 11px;
    cursor: pointer; text-decoration: underline;
    text-decoration-color: rgba(0,0,0,0.1);
    margin-left: auto;
  }
  .why-link:hover { color: var(--text); }

  .period-grid {
    padding: 16px 18px 8px;
  }
  .period-row {
    display: grid;
    grid-template-columns: 80px repeat(4, 1fr);
    gap: 6px;
    align-items: center;
    margin-bottom: 8px;
  }
  .period-fy {
    font-weight: 600; font-size: 12px; color: var(--text-2);
  }
  .period-fy small { display: block; color: var(--text-3); font-weight: 400; font-size: 10px; }
  .period-q {
    border: 1px solid var(--border);
    background: white;
    padding: 8px 6px;
    border-radius: var(--radius-sm);
    text-align: center;
    cursor: pointer;
    font-size: 11px;
    color: var(--text-3);
    transition: all 120ms;
  }
  .period-q:hover { border-color: var(--text-3); }
  .period-q.checked {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .period-q .q-label { font-weight: 600; }
  .period-q .q-range { font-size: 10px; opacity: 0.7; margin-top: 2px; }

  .source-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center; gap: 10px;
    padding: 9px 18px;
  }
  .source-row .check { width: 16px; height: 16px; border: 1.5px solid var(--border-strong); border-radius: 4px; cursor: pointer; flex-shrink: 0; background: white; display:flex; align-items:center; justify-content:center; transition: all 120ms; }
  .source-row .check.checked { background: var(--accent); border-color: var(--accent); }
  .source-row .check.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; }
  .source-row .source-name { font-size: 13px; }
  .source-row .source-table {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-3);
    background: var(--surface-2);
    padding: 2px 7px; border-radius: 4px;
  }
  .source-row.optional .source-name { color: var(--text-2); }

  .upload-area {
    margin: 14px 18px;
    border: 2px dashed var(--border-strong);
    border-radius: var(--radius);
    padding: 28px 16px;
    text-align: center;
    color: var(--text-3);
    cursor: pointer;
    transition: all 150ms;
  }
  .upload-area:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--accent);
  }
  .upload-area.has-files {
    padding: 14px;
  }
  .upload-icon { font-size: 24px; margin-bottom: 6px; opacity: 0.6; }
  .upload-hint { font-size: 12px; }

  .link-input {
    margin: 8px 18px 14px;
    display: flex; gap: 8px;
  }
  .link-input input {
    flex: 1; padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: inherit; font-size: 13px;
    background: white;
  }
  .link-input input:focus {
    outline: none; border-color: var(--accent);
  }

  .evidence-list {
    margin: 0 18px 8px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .evidence-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 4px;
    font-size: 13px;
  }
  .evidence-icon {
    width: 28px; height: 28px;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--text-2);
  }
  .evidence-name { flex: 1; }
  .evidence-attr { color: var(--text-3); font-size: 11px; }
  .evidence-remove {
    color: var(--text-3); cursor: pointer; padding: 4px;
  }
  .evidence-remove:hover { color: var(--rag-high); }

  /* ============================ POPOVER ============================ */
  .popover-backdrop {
    position: fixed; inset: 0;
    background: rgba(15, 23, 42, 0.4);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 160ms;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .popover {
    background: white;
    border-radius: var(--radius);
    padding: 24px 28px;
    max-width: 520px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: zoomIn 200ms ease-out;
  }
  .popover h3 { margin: 0 0 12px; font-size: 16px; }
  .popover p { margin: 0 0 12px; color: var(--text-2); font-size: 14px; line-height: 1.6; }
  .popover ul { padding-left: 20px; margin: 8px 0; color: var(--text-2); }
  .popover li { margin-bottom: 4px; }
  .popover-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

  /* ============================ SCREEN 4 ============================ */
  .report-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 22px 40px 0;
  }
  .report-header-top {
    display: flex; align-items: start; justify-content: space-between;
    gap: 24px;
    margin-bottom: 16px;
  }
  .report-meta {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--text-3);
    margin-bottom: 6px;
  }
  .version-tag {
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface-2); padding: 2px 8px;
    border-radius: 4px;
  }
  .report-title {
    font-size: 24px; font-weight: 600; letter-spacing: -0.02em;
    margin: 0;
  }

  .action-menu {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .action-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: white;
    font-family: inherit; font-size: 12px; font-weight: 500;
    color: var(--text-2);
    cursor: pointer;
    transition: all 120ms;
  }
  .action-btn:hover { border-color: var(--text-3); color: var(--text); background: var(--surface-2); }
  .action-btn.primary {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .action-btn.primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
  .action-btn.signed {
    background: #16a34a; color: white; border-color: #16a34a;
  }

  .tab-strip {
    display: flex; gap: 2px;
    border-bottom: 1px solid var(--border);
    margin: 0 -40px;
    padding: 0 40px;
    overflow-x: auto;
  }
  .tab {
    padding: 12px 18px;
    cursor: pointer;
    color: var(--text-3);
    font-size: 13px; font-weight: 500;
    border-bottom: 2px solid transparent;
    transition: all 120ms;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-num {
    font-size: 11px; opacity: 0.6; margin-right: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .report-body {
    padding: 32px 40px 80px;
    max-width: none;
  }
  .report-body h2 {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-3);
    margin: 0 0 12px;
  }
  .report-body h3 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 28px 0 10px;
  }
  .report-body p {
    font-size: 15px; line-height: 1.7; max-width: 760px;
    color: var(--text);
    margin: 0 0 14px;
  }

  /* Tab 1 — exec summary */
  .exec-grid {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 36px;
    align-items: start;
  }
  .kpi-rail {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    position: sticky; top: 20px;
  }
  .kpi-rail-title {
    font-size: 11px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 600; margin-bottom: 14px;
  }
  .kpi-tile {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .kpi-tile:last-child { border-bottom: none; }
  .kpi-label {
    font-size: 11px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .kpi-value {
    font-size: 22px; font-weight: 600; letter-spacing: -0.02em;
  }
  .kpi-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  /* Tab 2 — scope */
  .scope-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }
  .scope-col h4 {
    font-size: 11px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 600; margin: 0 0 12px;
  }
  .scope-col h4.in { color: #16a34a; }
  .scope-col h4.out { color: var(--rag-medium); }
  .scope-section {
    margin-bottom: 20px;
  }
  .scope-section-title {
    font-size: 13px; font-weight: 600; margin-bottom: 6px;
    color: var(--text-2);
  }
  .scope-list {
    list-style: none; padding: 0; margin: 0;
    font-size: 13px; color: var(--text-2);
  }
  .scope-list li {
    padding: 4px 0;
    display: flex; gap: 10px;
  }
  .scope-list li::before {
    content: '·'; color: var(--text-4);
  }
  .scope-list li small {
    display: block; color: var(--text-3); font-size: 11px;
    margin-top: 2px;
  }

  /* Tab 4 — charts */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .chart-card-title {
    font-size: 14px; font-weight: 600;
    margin-bottom: 4px;
  }
  .chart-card-sub {
    font-size: 12px; color: var(--text-3);
    margin-bottom: 14px;
  }
  .chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .chart-host { height: 320px; position: relative; }
  .chart-host-sm { height: 280px; position: relative; }

  table.report-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.report-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-3);
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
    cursor: pointer;
    user-select: none;
  }
  table.report-table th:hover { background: var(--border); }
  table.report-table th.sorted::after {
    content: ' ▾'; opacity: 0.5;
  }
  table.report-table td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  table.report-table tr:hover td { background: var(--surface-2); }
  td.number-cell { font-variant-numeric: tabular-nums; }
  td.traceable {
    cursor: pointer;
    color: var(--accent);
    text-decoration: underline;
    text-decoration-style: dotted;
  }
  .status-chip {
    display: inline-block;
    font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 10px;
  }
  .status-chip.review { background: var(--rag-medium-soft); color: var(--rag-medium); }
  .status-chip.flagged { background: var(--rag-high-soft); color: var(--rag-high); }
  .status-chip.ok { background: var(--rag-low-soft); color: var(--rag-low); }

  /* Tab 5 — observations */
  .observation {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-left: 4px solid var(--border);
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .observation.critical { border-left-color: var(--rag-critical); }
  .observation.high { border-left-color: var(--rag-high); }
  .observation.medium { border-left-color: var(--rag-medium); }
  .observation.low { border-left-color: var(--rag-low); }

  .obs-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .obs-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-3);
  }
  .obs-title {
    font-size: 15px; font-weight: 600; flex: 1;
    line-height: 1.4;
  }
  .obs-section {
    margin: 12px 0;
    font-size: 13px;
  }
  .obs-section-label {
    font-size: 11px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 4px;
    font-weight: 600;
  }
  .obs-section-body { color: var(--text-2); line-height: 1.6; }
  .control-chip {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    background: var(--accent-soft); color: var(--accent);

const $app = document.getElementById('app');

function render() {
  let body = '';
  if (state.screen === 'interstitialA' || state.screen === 'interstitialB') {
    body = renderInterstitial(state.screen);
  } else if (state.screen === 'mobile') {
    body = renderMobile();
  } else {
    body = `
      <div class="app">
        ${renderSidebar()}
        <div class="main">
          ${renderTopbar()}
          ${renderScreen()}
        </div>
      </div>
    `;
  }
  body += renderModal();
  body += renderToast();
  $app.innerHTML = body;
  attachHandlers();
  if (state.screen === 'report' && state.reportTab === 'analysis') {
    drawCharts();
  }
}

/* =================================================================
   SIDEBAR / TOPBAR
================================================================= */

    { id: 'home', label: 'Home', icon: iconHome() },

      <div class="brand">
        <div class="brand-mark"></div>

function renderScreen() {

    case 'history': return renderHistory();

let interstitialTimer = null;
let interstitialTimers = [];
function runInterstitial() {
  const isA = state.screen === 'interstitialA';
  const lines = isA ? LOG_LINES_A.map(l => ({ line: l, count: null })) : LOG_LINES_B;
  const duration = isA ? 15000 : 20000;
  const stepInterval = duration / lines.length;
  const log = document.getElementById('work-log');
  const counter = document.getElementById('row-counter');
  const bar = document.getElementById('progress-bar');

  interstitialTimers = [];

  // animate progress bar
  if (bar) {
    requestAnimationFrame(() => {
      bar.style.transition = `width ${duration}ms linear`;
      bar.style.width = '100%';
    });
  }

  lines.forEach((entry, i) => {
    const t = setTimeout(() => {
      if (!log) return;
      // mark last line as no longer active
      const prev = log.querySelectorAll('.log-line.active');
      prev.forEach(p => p.classList.remove('active'));
      // demote older lines
      log.querySelectorAll('.log-line').forEach((ln, idx, arr) => {
        const fromBottom = arr.length - idx;
        ln.classList.remove('older', 'oldest', 'recent');
        if (fromBottom === 1) ln.classList.add('recent');
        else if (fromBottom <= 3) ln.classList.add('older');
        else ln.classList.add('oldest');
      });
      const div = document.createElement('div');
      div.className = 'log-line active';
      div.innerHTML = formatLogLine(entry.line);
      log.appendChild(div);
      if (counter && entry.count !== null) {
        counter.innerHTML = `Rows scanned: <strong>${entry.count.toLocaleString()}</strong>`;
      }
    }, i * stepInterval);
    interstitialTimers.push(t);
  });

  const finishT = setTimeout(() => {
    if (isA) {
      state.screen = 'plan';
      render();
    } else {
      // show ready modal
      const overlay = document.querySelector('.interstitial');
      if (overlay) {
        const modal = document.createElement('div');
        modal.className = 'ready-modal';
        modal.innerHTML = `
          <div class="ready-modal-check">✓</div>
          <h3>Draft Report is Ready</h3>
          <p>The agent has assembled a six-section draft for your review.</p>
          <button class="btn btn-primary btn-lg" data-action="open-report">OK</button>
        `;
        overlay.appendChild(modal);
        modal.querySelector('[data-action="open-report"]').addEventListener('click', () => {
          state.screen = 'report';
          state.reportTab = 'summary';
          render();
        });
      }
    }
  }, duration + 200);
  interstitialTimers.push(finishT);
}

function skipInterstitial() {
  interstitialTimers.forEach(t => clearTimeout(t));
  interstitialTimers = [];
  if (state.screen === 'interstitialA') {
    state.screen = 'plan';
    render();
  } else {
    state.screen = 'report';
    state.reportTab = 'summary';
    render();
  }
}

function formatLogLine(s) {
  // wrap timestamp
  const m = s.match(/^(\[\d{2}:\d{2}:\d{2}\])\s+(.*)$/);
  if (m) {
    return `<span class="log-ts">${m[1]}</span>${m[2]}`;
  }
  return s;
}

function reportApproach() {
  return `
    <h2>Approach of the review</h2>
    <p>The agent worked from the amended standard text (validated against the FASB and IFRS Foundation primary sources) outward into Helix's operating data. Five steps were taken, in order.</p>

    <h3>1. Establishing the standard</h3>
    <p>The agent retrieved the amended ASC 606 / IFRS 15 text directly from the FASB and IFRS Foundation websites and computed a content hash to confirm authenticity. Sections relevant to performance-obligation identification (§606-10-25) and variable consideration (§606-10-32) were extracted and structured into 14 testable assertions.</p>

    <h3>2. Anchoring against prior audit work</h3>
    <p>Internal audit reports IA-2024-08 (revenue recognition under ASC 606) and IA-2025-12 (channel rebate accounting) were retrieved from the audit corpus. The 11 issues raised across both reports were mapped to the 14 assertions, producing a relevance matrix that drove sampling priorities.</p>

    <h3>3. Querying the data lake</h3>
    <p>Five Oracle source systems were queried for the in-scope period (FY27 Q1). Performance obligations were pulled from <span class="mono">RMC_PERFORMANCE_OBLIGATIONS</span> (14,802 rows), filtered to the 5 in-scope entities (11,418 rows), joined to <span class="mono">OKC_K_HEADERS_ALL_B</span> (1,247 distinct contracts), and traced through <span class="mono">OE_ORDER_LINES_ALL</span>, <span class="mono">XLA_AE_HEADERS</span>, and <span class="mono">GL_JE_LINES</span> for revenue posting reconciliation.</p>

    <h3>4. Sampling methodology</h3>
    <p>From the 1,247 in-scope contracts, the agent drew a stratified sample of 312 — stratified by line of business and contract value, with intentional oversampling of contracts above $1M ARR and contracts containing more than two distinct performance obligations. The sample is intended to support a 95% confidence interval at ±3% relative precision on the headline impact estimate.</p>

    <h3>5. Human calibration</h3>
    <p>At the planning step, the Head of Internal Audit reviewed and adjusted the agent's first-pass scope across six calibration tiles (controls, entities, LOBs, period, source systems, evidence). All inclusions and exclusions made at that step are reflected in the Scope tab and have been carried through this analysis without further alteration.</p>

    <h3>6. Validation</h3>
    <p>Every quantitative figure in the report is traceable to its source records. The figure-to-source map runs to 1,418 records and is available behind any underlined number on the Key analysis tab. Two reasonableness checks were applied: (a) the FY27 Q1 baseline reconciles to the GL trial balance within $0.4M; (b) the variance pattern is directionally consistent with the FY26 Q4 baseline.</p>
  `;
}

        <div style="padding:18px 24px;color:var(--text-2);">
          <p>14 external feeds active · 4 primary regulators · 6 standard-setters · 4 industry channels.</p>
          <p>Validation policy: every change must be verified against the issuing body's primary source before triage.</p>
          <p>Last full sweep: 47 minutes ago. Next sweep: in 13 minutes.</p>
        </div>
      </div>
    </div>
  `;
}

/* =================================================================
   MODAL
================================================================= */
function renderModal() {
  if (!state.modal) return '';
  const m = state.modal;
  if (m === 'signoff') return modalSignoff();
  if (m === 'share') return modalShare();
  if (m === 'why-controls') return modalWhy('controls');
  if (m === 'why-entities') return modalWhy('entities');
  if (m === 'why-lobs') return modalWhy('lobs');
  if (m === 'trace') return modalTrace();
  if (m === 'note') return modalNote();
  return '';
}

function modalSignoff() {
  return `
    <div class="popover-backdrop" data-action="close-modal">
      <div class="modal-card" data-stop="1">
        <h2 class="modal-title">Conclude this review?</h2>
        <div class="modal-body">
          <p>By concluding, you confirm that you have read all six sections, reviewed the underlying figures, and accept the agent's analysis as the basis for action. The report will be locked, version-stamped, and added to the audit corpus.</p>
          <div class="modal-checks">
            <div class="check-row" data-toggle="signoff-check" data-id="reviewed">
              <div class="check ${state.modalData?.reviewed ? 'checked' : ''}"></div>
              <span>I have reviewed all facts and supporting evidence.</span>
            </div>
            <div class="check-row" data-toggle="signoff-check" data-id="ready">
              <div class="check ${state.modalData?.ready ? 'checked' : ''}"></div>

            </div>

        <div class="modal-actions">
          <button class="btn" data-action="close-modal">Cancel</button>

function modalShare() {

        <h2 class="modal-title">Share this report</h2>

}

function modalNote() {
  return `
    <div class="popover-backdrop" data-action="close-modal">
      <div class="modal-card" data-stop="1">
        <h2 class="modal-title">Add CAE note</h2>
        <p style="color:var(--text-2);font-size:14px;">This note will appear inline in the Executive summary tab of the final report.</p>
        <textarea id="note-textarea" rows="6" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;resize:vertical;">${state.caeNote}</textarea>
        <div class="modal-actions">
          <button class="btn" data-action="close-modal">Cancel</button>
          <button class="btn btn-primary" data-action="save-note">Save note</button>
        </div>
      </div>
    </div>
  `;
}

function renderToast() {
  if (!state.toast) return '';
  return `<div class="toast">${state.toast}</div>`;
}

/* =================================================================
   HANDLERS
================================================================= */
function attachHandlers() {
  // navigation
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', e => {
      const target = el.dataset.nav;
      if (target === 'home') state.screen = 'home';
      else if (target === 'history') state.screen = 'history';
      else if (target === 'planpage') state.screen = 'planpage';
      else if (target === 'settings') state.screen = 'settings';
      render();
    });
  });

  document.querySelectorAll('[data-notif]').forEach(el => {
    el.addEventListener('click', e => {
      // ignore if click was on the action button (handled separately)
      state.activeNotificationId = el.dataset.notif;
      state.screen = 'analysis';
      render();
      window.scrollTo(0,0);
    });
  });

  document.querySelectorAll('[data-action="discover"]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      state.activeNotificationId = el.dataset.id;
      state.screen = 'analysis';
      render();
      window.scrollTo(0,0);
    });
  });

  // mobile entry: "Plan before the Analysis" → screen 2 (preliminary analysis)
  document.querySelectorAll('[data-action="mobile-plan"]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      state.activeNotificationId = state.notifications[0].id;
      state.screen = 'analysis';
      render();
      window.scrollTo(0,0);
    });
  });

  // mobile entry: "Start Analysis Now" → analysis animation → Draft Report Ready popup → report
  document.querySelectorAll('[data-action="mobile-start"]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      state.activeNotificationId = state.notifications[0].id;
      state.screen = 'interstitialB';
      render();
      setTimeout(runInterstitial, 60);
    });
  });

  // role select
  const roleSel = document.getElementById('role-select');
  if (roleSel) roleSel.addEventListener('change', e => {
    state.role = e.target.value;
    render();
  });

  // analysis -> plan
  document.querySelectorAll('[data-action="goto-plan"]').forEach(el => {
    el.addEventListener('click', () => {
      state.screen = 'interstitialA';
      render();
      setTimeout(runInterstitial, 60);
    });
  });
  document.querySelectorAll('[data-action="back-analysis"]').forEach(el => {
    el.addEventListener('click', () => { state.screen = 'analysis'; render(); window.scrollTo(0,0); });
  });
  document.querySelectorAll('[data-action="rescreen"]').forEach(el => {
    el.addEventListener('click', () => { showToast('Re-screen requested · agent will refresh the analysis'); });
  });

  // calibration toggles
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', e => {
      const t = el.dataset.toggle;
      const id = el.dataset.id;
      if (t === 'control') state.calibration.controls[id] = !state.calibration.controls[id];
      else if (t === 'entity') state.calibration.entities[id] = !state.calibration.entities[id];
      else if (t === 'lob') state.calibration.lobs[id] = !state.calibration.lobs[id];
      else if (t === 'source') state.calibration.sources[id] = !state.calibration.sources[id];
      else if (t === 'period') state.calibration.periods[id] = !state.calibration.periods[id];
      else if (t === 'signoff-check') {
        if (!state.modalData) state.modalData = {};
        state.modalData[id] = !state.modalData[id];
      }
      render();
    });
  });

  // why links
  document.querySelectorAll('[data-action="why"]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      state.modal = 'why-' + el.dataset.key;
      render();
    });
  });

  // run impact
  document.querySelectorAll('[data-action="run-impact"]').forEach(el => {
    el.addEventListener('click', () => {
      state.screen = 'interstitialB';
      render();
      setTimeout(runInterstitial, 60);
    });
  });

  document.querySelectorAll('[data-action="save-template"]').forEach(el => {
    el.addEventListener('click', () => showToast('Calibration saved as a template'));
  });

  document.querySelectorAll('[data-action="add-control"]').forEach(el => el.addEventListener('click', () => showToast('Add-control dialog (prototype)')));
  document.querySelectorAll('[data-action="add-entity"]').forEach(el => el.addEventListener('click', () => showToast('Add-entity dialog (prototype)')));
  document.querySelectorAll('[data-action="add-lob"]').forEach(el => el.addEventListener('click', () => showToast('Add-LOB dialog (prototype)')));
  document.querySelectorAll('[data-action="add-evidence"]').forEach(el => el.addEventListener('click', () => {
    state.calibration.evidence.push({ name: 'Position-paper-' + (state.calibration.evidence.length+1) + '.docx', type: 'DOC', addedBy: state.role });
    showToast('Document attached');
    render();
  }));
  document.querySelectorAll('[data-action="add-evidence-link"]').forEach(el => el.addEventListener('click', () => {
    const inp = document.getElementById('evidence-link');
    const v = inp && inp.value.trim();
    if (v) {
      state.calibration.evidence.push({ name: v, type: 'URL', addedBy: state.role });
      showToast('Link attached');
      render();
    }
  }));
  document.querySelectorAll('[data-action="remove-evidence"]').forEach(el => el.addEventListener('click', e => {
    e.stopPropagation();
    state.calibration.evidence.splice(parseInt(el.dataset.i), 1);
    render();
  }));

  // skip
  document.querySelectorAll('[data-action="skip-interstitial"]').forEach(el => el.addEventListener('click', skipInterstitial));

  // report tabs
  document.querySelectorAll('[data-tab]').forEach(el => el.addEventListener('click', () => {
    state.reportTab = el.dataset.tab;
    state.showExportMenu = false;
    render();
  }));

  // report actions
  document.querySelectorAll('[data-action="recalibrate"]').forEach(el => el.addEventListener('click', () => {
    state.screen = 'plan'; render(); window.scrollTo(0,0);
    showToast('Calibration restored — re-run impact analysis when ready');
  }));
  document.querySelectorAll('[data-action="share"]').forEach(el => el.addEventListener('click', () => { state.modal = 'share'; render(); }));
  document.querySelectorAll('[data-action="export"]').forEach(el => el.addEventListener('click', () => {
    state.showExportMenu = !state.showExportMenu; render();
  }));
  document.querySelectorAll('[data-action="export-do"]').forEach(el => el.addEventListener('click', () => {
    state.showExportMenu = false; showToast('Exporting as ' + el.dataset.fmt + ' · v1 · ' + new Date().toLocaleString());
    render();
  }));
  document.querySelectorAll('[data-action="email-self"]').forEach(el => el.addEventListener('click', () => {
    showToast('Sent to emma@helix.com — PDF, v1');
  }));
  document.querySelectorAll('[data-action="add-note"]').forEach(el => el.addEventListener('click', () => {
    state.modal = 'note'; render();
  }));
  document.querySelectorAll('[data-action="save-note"]').forEach(el => el.addEventListener('click', () => {
    const ta = document.getElementById('note-textarea');
    state.caeNote = ta ? ta.value : '';
    state.modal = null;
    render();
    showToast('CAE note saved');
  }));
  document.querySelectorAll('[data-action="escalate"]').forEach(el => el.addEventListener('click', () => {
    showToast('Staged for the next AC pre-read');
  }));
  document.querySelectorAll('[data-action="signoff"]').forEach(el => el.addEventListener('click', () => {
    state.modal = 'signoff';
    state.modalData = { reviewed: false, ready: false };
    render();
  }));
  document.querySelectorAll('[data-action="confirm-signoff"]').forEach(el => el.addEventListener('click', () => {
    if (!state.modalData?.reviewed || !state.modalData?.ready) return;
    state.signed = true;
    state.modal = null;
    state.modalData = null;
    render();
    showToast('Report signed off · locked at v1.0 · added to corpus');
  }));
  document.querySelectorAll('[data-action="close-modal"]').forEach(el => el.addEventListener('click', e => {
    if (e.target.dataset.stop) return;
    state.modal = null;
    state.modalData = null;
    render();
  }));
  document.querySelectorAll('[data-stop]').forEach(el => el.addEventListener('click', e => e.stopPropagation()));
  document.querySelectorAll('[data-action="do-share"]').forEach(el => el.addEventListener('click', () => {
    state.modal = null;
    showToast('Shared with ' + el.dataset.name + ' as Reviewer');
    render();
  }));

  // trace
  document.querySelectorAll('[data-action="trace"]').forEach(el => el.addEventListener('click', () => {
    state.modal = 'trace';
    state.modalData = { id: el.dataset.id };
    render();
  }));

  // history
  document.querySelectorAll('[data-action="open-signed"]').forEach(el => el.addEventListener('click', () => {
    state.activeNotificationId = 'n1';
    state.screen = 'report';
    state.reportTab = 'summary';
    render();
  }));
}

function showToast(msg) {
  state.toast = msg;
  render();
  setTimeout(() => { state.toast = null; render(); }, 2400);
}

/* =================================================================
   GO
================================================================= */
render();
</script>
</body>
</html>
